{% extends "base.html" %}
{% block content %}
  <h1>Register</h1>

  {% if error %}
    <p style="color:red">{{ error }}</p>
  {% endif %}

  <form method="post">
    Username:<br><input name="username" value="{{ username or '' }}"><br>
    Email:<br><input name="email" value="{{ email or '' }}"><br>
    Passwort:<br><input type="password" name="password"><br><br>
    <button type="submit">Registrieren</button>
  </form>
{% endblock %}
